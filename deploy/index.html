<script>

/* FusionOS 6.0 — Core */
/* Icon helper */
function ico(id,sz){sz=sz||'';return '<svg class="ico'+(sz?' ico-'+sz:'')+'"><use href="#'+id+'"/></svg>';}
const APPS=[
  {id:'finder',name:'此电脑',ico:'ic-finder'},
  {id:'terminal',name:'终端',ico:'ic-terminal'},
  {id:'notes',name:'记事本',ico:'ic-notes'},
  {id:'calc',name:'计算器',ico:'ic-calc'},
  {id:'browser',name:'浏览器',ico:'ic-browser'},
  {id:'settings',name:'设置',ico:'ic-settings'},
  {id:'music',name:'音乐',ico:'ic-music'},
  {id:'map',name:'地图',ico:'ic-map'},
  {id:'weather',name:'天气',ico:'ic-weather'},
  {id:'paint',name:'绘图',ico:'ic-paint'},
  {id:'clock',name:'时钟',ico:'ic-clock'},
  {id:'calendar',name:'日历',ico:'ic-calendar'},
  {id:'monitor',name:'系统监控',ico:'ic-monitor'},
  {id:'video',name:'视频',ico:'ic-video'},
  {id:'photos',name:'相册',ico:'ic-photos'},
  {id:'mail',name:'邮件',ico:'ic-mail'},
  {id:'snake',name:'贪吃蛇',ico:'ic-snake'},
  {id:'tasks',name:'任务',ico:'ic-tasks'},
  {id:'minesweeper',name:'扫雷',ico:'ic-minesweeper'},
  {id:'tetris',name:'俄罗斯方块',ico:'ic-tetris'},
  {id:'breakout',name:'打砖块',ico:'ic-breakout'},
  {id:'code-editor',name:'代码编辑器',ico:'ic-code-editor'},
  {id:'stopwatch-app',name:'秒表',ico:'ic-stopwatch-app'},
  {id:'converter',name:'单位换算',ico:'ic-converter'},
  {id:'reader',name:'文档查看器',ico:'ic-reader'},
  {id:'password',name:'密码生成器',ico:'ic-password'},
  {id:'qrcode',name:'二维码',ico:'ic-qrcode'},
  {id:'recorder',name:'录音机',ico:'ic-recorder'},
  {id:'charts',name:'图表',ico:'ic-charts'},
  {id:'rss',name:'RSS 阅读',ico:'ic-rss'},
  {id:'diary',name:'日记',ico:'ic-diary'},
  {id:'translator',name:'翻译',ico:'ic-translator'},
  {id:'stocks',name:'股票',ico:'ic-stocks'}

];
let windows={},winOrder=0,winZ=100,focusedWin=null,notifs=[],notifId=0;

/* ═ Persistence System ── 数据持久化 */
function saveState(){
  try{
    localStorage.setItem('fus-vfs',JSON.stringify(VFS));
    localStorage.setItem('fus-wallpaper',document.getElementById('desktop').className.replace('wallpaper-',''));
    localStorage.setItem('fus-accent',getComputedStyle(document.documentElement).getPropertyValue('--accent').trim());
    localStorage.setItem('fus-notes',document.getElementById('nt-sys')?document.getElementById('nt-sys').value:localStorage.getItem('fus-notes')||'');
  }catch(e){}
}
function loadState(){
  try{
    var saved=localStorage.getItem('fus-vfs');
    if(saved){var parsed=JSON.parse(saved);Object.keys(parsed).forEach(function(k){VFS[k]=parsed[k]});}
    // Legacy wallpaper/accent → migrate to settings
    var wp=localStorage.getItem('fus-wallpaper');
    var ac=localStorage.getItem('fus-accent');
    if(wp&&!settingState.wallpaper)settingState.wallpaper=wp;
    if(ac&&settingState.accent===SETTINGS_DEFAULTS.accent)settingState.accent=ac;
  }catch(e){}
  applyAllSettings();
}
window.addEventListener('beforeunload',function(){saveState();});

/* ═ Login */
(function(){
  var c=document.getElementById('login-bg-canvas');
  if(!c)return;
  c.width=window.innerWidth;c.height=window.innerHeight;
  var ctx=c.getContext('2d');
  var pts=[];
  for(var i=0;i<40;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,
    r:Math.random()*2+1,dx:(Math.random()-0.5)*0.3,dy:(Math.random()-0.5)*0.3,
    o:Math.random()*0.4+0.1});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(function(p){
      p.x+=p.dx;p.y+=p.dy;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+p.o+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function doLogin(){
  var pwd=document.getElementById('login-pwd').value;
  var bar=document.getElementById('login-prog');
  bar.style.width='30%';
  setTimeout(function(){bar.style.width='70%'},400);
  setTimeout(function(){
    bar.style.width='100%';
    if(pwd&&pwd!=='123456'){showToast('err','登录失败','密码错误');bar.style.width='0%';return;}
    loadState();
    document.getElementById('login-screen').classList.add('hidden');
    window._bootTime=Date.now();
    setTimeout(function(){initDesktop();showToast('info','欢迎回来','FusionOS 已就绪');
      addNotif('系统','FusionOS 桌面环境已加载','ic-info');startClock();refreshWallpaperParticles();
    },500);
  },800);
}

function doLogout(){
  saveState();
  Object.keys(windows).forEach(function(k){var w=windows[k];if(w.el)w.el.remove();});
  windows={};winOrder=0;winZ=100;focusedWin=null;
  document.getElementById('desktop').style.opacity='0';document.getElementById('topbar').style.opacity='0';document.getElementById('dock').style.opacity='0';
  setTimeout(function(){
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-pwd').value='';
    document.getElementById('desktop').style.opacity='';document.getElementById('topbar').style.opacity='';document.getElementById('dock').style.opacity='';
  },400);
  showToast('info','已注销','数据已保存');
}

/* ═ Desktop Init */
function initDesktop(){buildDesktopIcons();buildDock();renderStartMenu();initDesktopGrid();
  applyAllSettings();
  document.addEventListener('click',onGlobalClick);
  document.addEventListener('contextmenu',onContextMenu);
  document.addEventListener('keydown',onKeyDown);
}
function buildDesktopIcons(){
  var c=document.getElementById('desktop-icons');
  c.innerHTML='';
  APPS.forEach(function(a){
    var d=document.createElement('div');
    d.className='desktop-icon';d.dataset.app=a.id;
    d.ondblclick=function(){openApp(a.id)};
    d.onclick=function(){selectDesktopIcon(d)};
    d.onmousedown=function(e){startIconDrag(e,d)};
    d.innerHTML='<div class="desktop-icon-inner icon-'+a.id+'">'+ico(a.ico)+'</div>'
      +'<span class="desktop-icon-label">'+a.name+'</span>';
    c.appendChild(d);
  });
}
function buildDock(){
  var c=document.getElementById('dock');
  c.innerHTML='';
  APPS.slice(0,18).forEach(function(a,i){
    if(i>0)c.appendChild(document.createTextNode(''));
    var d=document.createElement('div');d.className='dock-item';d.dataset.app=a.id;
    d.onclick=function(){openApp(a.id)};
    d.innerHTML='<span class="dock-tooltip">'+a.name+'</span>'+ico(a.ico);
    c.appendChild(d);
    if(i<APPS.length-1){var s=document.createElement('div');s.className='dock-separator';c.appendChild(s);}
  });
}

/* ═ Clock */
function startClock(){updateClock();updateSysTray();setInterval(function(){updateClock();updateSysTray();},10000);}
function updateClock(){
  var d=new Date(),h=(''+d.getHours()).padStart(2,'0'),m=(''+d.getMinutes()).padStart(2,'0');
  var el=document.getElementById('topbar-time');if(el)el.textContent=h+':'+m;
}
function updateSysTray(){
  var bat=document.getElementById('battery-icon'),wifi=document.getElementById('wifi-icon');
  if(bat){bat.innerHTML=ico('ic-battery');bat.title='电池';if(navigator.getBattery){navigator.getBattery().then(function(b){var l=Math.round(b.level*100);bat.title='电池: '+l+'%';}).catch(function(){});}}
  if(wifi){wifi.innerHTML=ico('ic-wifi');wifi.title='Wi-Fi: FusionNet';}
}

/* ═ Wallpaper Particles */
function refreshWallpaperParticles(){
  var c=document.getElementById('wallpaper-particles');if(!c)return;c.innerHTML='';
  for(var i=0;i<12;i++){
    var p=document.createElement('div');p.className='wallpaper-particle';
    var s=Math.random()*80+40;p.style.width=s+'px';p.style.height=s+'px';
    p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';
    p.style.animationDelay=Math.random()*8+'s';p.style.animationDuration=(6+Math.random()*6)+'s';
    c.appendChild(p);
  }
}

/* ═ Desktop Icon Drag */
var GRID={colW:92,rowH:96,padX:16,padY:16},selectedIcon=null,iconDrag=null;
function getGridPos(col,row){return{x:GRID.padX+col*GRID.colW,y:GRID.padY+row*GRID.rowH}}
function getNearestGrid(px,py){
  var mc=Math.max(1,Math.floor((window.innerWidth-GRID.padX*2)/GRID.colW));
  var c=Math.round((px-GRID.padX)/GRID.colW),r=Math.round((py-GRID.padY)/GRID.rowH);
  return{col:Math.max(0,Math.min(c,mc-1)),row:Math.max(0,r)};
}
function getAllIcons(){return[].slice.call(document.querySelectorAll('#desktop-icons .desktop-icon'))}
function setIconPos(el,col,row,animate){
  el.dataset.col=col;el.dataset.row=row;
  var p=getGridPos(col,row);el.style.left=p.x+'px';el.style.top=p.y+'px';
  if(animate){el.style.transition='left 0.22s cubic-bezier(0.16,1,0.3,1),top 0.22s cubic-bezier(0.16,1,0.3,1)';
    setTimeout(function(){el.style.transition='background 0.15s,transform 0.15s'},240);}
}
function autoSortIcons(){
  var icons=getAllIcons().map(function(el){return{el:el,c:parseInt(el.dataset.col)||0,r:parseInt(el.dataset.row)||0}});
  icons.sort(function(a,b){return a.r-b.r||a.c-b.c});
  var mc=Math.max(1,Math.floor((window.innerWidth-GRID.padX*2)/GRID.colW));
  icons.forEach(function(item,i){setIconPos(item.el,i%mc,Math.floor(i/mc),true);});
}
function selectDesktopIcon(el){
  if(selectedIcon)selectedIcon.classList.remove('selected');selectedIcon=el;el.classList.add('selected');
}
function startIconDrag(e,el){
  if(e.button!==0)return;e.preventDefault();
  var rect=el.getBoundingClientRect();
  var desk=document.getElementById('desktop').getBoundingClientRect();
  iconDrag={el:el,offX:e.clientX-rect.left,offY:e.clientY-rect.top,
    origCol:parseInt(el.dataset.col)||0,origRow:parseInt(el.dataset.row)||0,
    startX:e.clientX,startY:e.clientY,moved:false,deskTop:desk.top,deskLeft:desk.left};
  el.classList.add('dragging');
  document.addEventListener('mousemove',onIconDrag);
  document.addEventListener('mouseup',stopIconDrag);
  selectDesktopIcon(el);
}
function onIconDrag(e){
  if(!iconDrag)return;
  if(!iconDrag.moved){var dx=Math.abs(e.clientX-iconDrag.startX),dy=Math.abs(e.clientY-iconDrag.startY);if(dx<5&&dy<5)return;iconDrag.moved=true;}
  var el=iconDrag.el;el.style.transition='none';
  el.style.left=(e.clientX-iconDrag.deskLeft-iconDrag.offX)+'px';
  el.style.top=(e.clientY-iconDrag.deskTop-iconDrag.offY)+'px';
}
function stopIconDrag(e){
  document.removeEventListener('mousemove',onIconDrag);
  document.removeEventListener('mouseup',stopIconDrag);
  if(!iconDrag)return;
  var el=iconDrag.el;el.classList.remove('dragging');
  el.style.transition='left 0.22s cubic-bezier(0.16,1,0.3,1),top 0.22s cubic-bezier(0.16,1,0.3,1)';
  if(iconDrag.moved){
    var cx=parseFloat(el.style.left)+38,cy=parseFloat(el.style.top)+41;var g=getNearestGrid(cx,cy);
    var occ=getAllIcons().find(function(o){return o!==el&&parseInt(o.dataset.col)===g.col&&parseInt(o.dataset.row)===g.row});
    if(occ){setIconPos(occ,iconDrag.origCol,iconDrag.origRow,true);}
    setIconPos(el,g.col,g.row,true);setTimeout(autoSortIcons,250);
  }else{setIconPos(el,iconDrag.origCol,iconDrag.origRow,true);}
  iconDrag=null;
}
function initDesktopGrid(){
  var icons=getAllIcons();var mc=Math.max(1,Math.floor((window.innerWidth-GRID.padX*2)/GRID.colW));
  icons.forEach(function(el,i){var col=i%mc,row=Math.floor(i/mc);el.dataset.col=col;el.dataset.row=row;
    var p=getGridPos(col,row);el.style.left=p.x+'px';el.style.top=p.y+'px';el.style.transition='none';
  });
}
window.addEventListener('resize',initDesktopGrid);

/* ═ Window Management */
function openApp(appId,ev){
  if(ev)ev.stopPropagation();
  var existing=Object.keys(windows).map(function(k){return windows[k]}).find(function(w){return w.appId===appId&&!w.closed});
  if(existing){if(focusedWin===existing.id){minimizeWindow(existing.id);return;}focusWindow(existing.id);return;}
  winOrder++;var id='win-'+winOrder;var app=APPS.find(function(a){return a.id===appId})||APPS[0];
  var w=window.innerWidth*0.55,h=window.innerHeight*0.6;
  var x=(window.innerWidth-w)/2+(Math.random()*40-20),y=(window.innerHeight-h)/2+(Math.random()*30-15);
  var win=document.createElement('div');win.className='window';win.id=id;
  win.style.left=x+'px';win.style.top=y+'px';win.style.width=w+'px';win.style.height=h+'px';

    +'<span class="close" onclick="closeWindow(\''+id+'\')"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M2 2l4 4M6 2l-4 4" stroke="#4a0000" stroke-width="1.2" fill="none"/></svg></span>'
    +'<span class="min" onclick="minimizeWindow(\''+id+'\')"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M2 4h4" stroke="#6a5300" stroke-width="1.2"/></svg></span>'
    +'<span class="max" onclick="toggleMaximize(\''+id+'\')"><svg width="8" height="8" viewBox="0 0 8 8"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="#006000" stroke-width="1" fill="none"/></svg></span>'
    +'</div><div class="window-title">'+app.name+'</div></div>'
    +'<div class="window-body" id="body-'+id+'"></div>';
  document.getElementById('windows-container').appendChild(win);
  windows[id]={appId:appId,el:win,closed:false,minimized:false,maximized:false};
  focusWindow(id);renderAppContent(id,appId);makeDraggable(win);updateDock();
}
function closeWindow(id){
  var win=windows[id];if(!win)return;
  if(clockStates[id]){if(clockStates[id]._tickInt)clearInterval(clockStates[id]._tickInt);if(clockStates[id]._swInt)clearInterval(clockStates[id]._swInt);if(clockStates[id].tm&&clockStates[id].tm.interval)clearInterval(clockStates[id].tm.interval);delete clockStates[id];}
  if(monStates[id]){if(monStates[id]._int)clearInterval(monStates[id]._int);delete monStates[id];}
  win.el.classList.add('closing');
  setTimeout(function(){win.el.remove();delete windows[id];if(focusedWin===id)focusedWin=null;updateDock();},260);
}
function minimizeWindow(id){var win=windows[id];if(!win)return;win.minimized=true;win.el.style.display='none';if(focusedWin===id)focusedWin=null;updateDock();}
function toggleMaximize(id){
  var win=windows[id];if(!win)return;
  if(win.maximized){win.el.classList.remove('maximized');win.el.style.left=win._prevLeft;win.el.style.top=win._prevTop;win.el.style.width=win._prevW;win.el.style.height=win._prevH;win.maximized=false;}
  else{win._prevLeft=win.el.style.left;win._prevTop=win.el.style.top;win._prevW=win.el.style.width;win._prevH=win.el.style.height;win.el.classList.add('maximized');win.el.style.left='0';win.el.style.top='28px';win.el.style.width='100%';win.el.style.height='calc(100vh - 84px)';win.maximized=true;}
}
function focusWindow(id){
  var win=windows[id];if(!win||win.closed)return;
  win.el.style.zIndex=++winZ;win.el.classList.add('focused');
  if(focusedWin&&focusedWin!==id){var pw=windows[focusedWin];if(pw)pw.el.classList.remove('focused');}
  focusedWin=id;win.el.style.display='';win.minimized=false;updateDock();
}
function makeDraggable(el){
  var bar=el.querySelector('.window-titlebar');if(!bar)return;var ox,oy,dragging=false;
  bar.addEventListener('mousedown',function(e){
    if(e.target.closest('.traffic-lights'))return;dragging=true;
    var r=el.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;el.style.transition='none';focusWindow(el.id);
    function onMove(e2){if(!dragging)return;var w=el.getBoundingClientRect().width;
      var nx=e2.clientX-ox,ny=e2.clientY-oy;nx=Math.max(-w+80,Math.min(nx,window.innerWidth-80));ny=Math.max(28,Math.min(ny,window.innerHeight-56));
      el.style.left=nx+'px';el.style.top=ny+'px';}
    function onUp(){dragging=false;el.style.transition='';document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
  var rh=document.createElement('div');rh.style.cssText='position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:se-resize';el.appendChild(rh);
  rh.addEventListener('mousedown',function(e){e.stopPropagation();var r=el.getBoundingClientRect();var sx=e.clientX,sy=e.clientY,sw=r.width,sh=r.height;
    function onMove(e2){el.style.width=Math.max(280,sw+e2.clientX-sx)+'px';el.style.height=Math.max(200,sh+e2.clientY-sy)+'px';}
    function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);}
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
  });
}
function updateDock(){document.querySelectorAll('#dock .dock-item').forEach(function(el){var appId=el.dataset.app;
  var isOpen=Object.keys(windows).map(function(k){return windows[k]}).some(function(w){return w.appId===appId&&!w.closed});

});}

var VFS={'/':{t:'d',c:{
  '用户':{t:'d',c:{
    '文档':{t:'d',c:{
      'README.txt':{t:'f',d:'欢迎使用 FusionOS 6.0！\n\n融合 Windows 与 macOS 设计哲学的桌面系统。\n\n功能：\n- 地图：百度地图实时浏览\n- 天气：中国气象台实时数据\n- 绘图：完整画板工具\n- 全部自定义 SVG 图标'},
      'todo.txt':{t:'f',d:'1. 完善地图功能\n2. 天气实时数据\n3. 绘图软件\n4. 继续优化'}
    }},
    '图片':{t:'d',c:{'截图.png':{t:'f',d:'[图片]'}}},
    '音乐':{t:'d',c:{'小幸运.mp3':{t:'f',d:'[音频]'}}},
    '桌面':{t:'d',c:{}}
  }},
  '系统':{t:'d',c:{
    'kernel.js':{t:'f',d:'// FusionOS 内核 v6.0\nconst KERNEL_READY=true;'},
    'boot.log':{t:'f',d:'[OK] kernel init\n[OK] vfs mount\n[OK] wm start\n[OK] desktop ready'}
  }}
}}};

function vfsList(path){
  var p=path.split('/').filter(Boolean);var n=VFS['/'];
  for(var i=0;i<p.length;i++){if(!n.c||!n.c[p[i]])return[];n=n.c[p[i]];}
  if(!n.c)return[];return Object.keys(n.c).map(function(k){return{name:k,type:n.c[k].t};});
}
function vfsNode(path){
  var p=path.split('/').filter(Boolean);var n=VFS['/'];
  for(var i=0;i<p.length;i++){if(!n.c||!n.c[p[i]])return null;n=n.c[p[i]];}
  return n;
}
function vfsParent(path){
  var p=path.split('/').filter(Boolean);if(!p.length)return null;
  var n=VFS['/'];for(var i=0;i<p.length-1;i++){if(!n.c||!n.c[p[i]])return null;n=n.c[p[i]];}
  return{node:n,name:p[p.length-1]};
}
function vfsMkdir(path){
  var parts=path.split('/').filter(Boolean);if(!parts.length)return false;
  var name=parts.pop(),parentPath='/'+parts.join('/');
  var parent=vfsNode(parentPath);if(!parent||!parent.c)return false;
  if(parent.c[name])return false;
  parent.c[name]={t:'d',c:{}};saveState();return true;
}
function vfsTouch(path){
  var parts=path.split('/').filter(Boolean);if(!parts.length)return false;
  var name=parts.pop(),parentPath='/'+parts.join('/');
  var parent=vfsNode(parentPath);if(!parent||!parent.c)return false;
  if(parent.c[name])return false;
  parent.c[name]={t:'f',d:''};saveState();return true;
}
function vfsRm(path){
  var p=vfsParent(path);if(!p)return false;
  if(!p.node.c||!p.node.c[p.name])return false;
  delete p.node.c[p.name];saveState();return true;
}
function vfsRename(path,newName){
  var p=vfsParent(path);if(!p)return false;
  if(!p.node.c||!p.node.c[p.name])return false;
  if(p.node.c[newName])return false;
  p.node.c[newName]=p.node.c[p.name];
  delete p.node.c[p.name];saveState();return true;
}
function vfsWriteFile(path,content){
  var node=vfsNode(path);if(!node||node.t!=='f')return false;
  node.d=content;saveState();return true;
}
function vfsReadFile(path){
  var node=vfsNode(path);if(!node||node.t!=='f')return null;
  return node.d||'';
}

/* ── 虚拟磁盘 16GB ── */
var vDisk={total:16*1024*1024*1024, sysReserved:2.8*1024*1024*1024};
function calcDiskUsed(){
  var total=0;
  function walk(node){if(!node)return;if(node.t==='f'&&node.d)total+=new Blob([node.d]).size;if(node.c)Object.values(node.c).forEach(walk);}
  walk(VFS['/']);
  return vDisk.sysReserved+total;
}
function diskFree(){return vDisk.total-calcDiskUsed();}
function fmtSize(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return (bytes/1024).toFixed(1)+' KB';
  if(bytes<1073741824)return (bytes/1048576).toFixed(1)+' MB';
  return (bytes/1073741824).toFixed(1)+' GB';
}
function renderStorageBar(id){
  var used=calcDiskUsed(),free=diskFree(),pct=((used/vDisk.total)*100).toFixed(1);
  var cls='';if(pct>90)cls='danger';else if(pct>75)cls='warn';
  var el=document.getElementById(id);if(!el)return;
  el.innerHTML='<div class="finder-storage-label"><svg class=\"ico\"><use href=\"#ic-disk\"/></svg> FusionDisk</div>'
    +'<div class="finder-storage-bar"><div class="finder-storage-fill '+cls+'" style="width:'+pct+'%"></div></div>'
    +'<div class="finder-storage-text">'+fmtSize(free)+' 可用，共 '+fmtSize(vDisk.total)+'</div>';
}

function finderCtx(e,path,type,winId){
  e.preventDefault();e.stopPropagation();
  var menu=document.getElementById('finder-ctx-menu');

function findRename(path,winId){

  else{showToast('err','重命名失败','名称冲突或路径无效');}
}
function findDelete(path,winId){
  if(!confirm('确定删除 "'+path.split('/').filter(Boolean).pop()+'" 吗？'))return;
  if(vfsRm(path)){fnav(finderPaths[winId]||'/',winId);showToast('ok','已删除','');}

var editorFilePath=null;
function openTextEditor(filePath){
  var existing=Object.keys(windows).map(function(k){return windows[k]}).find(function(w){return w.appId==='textedit'&&!w.closed});
  if(existing){focusWindow(existing.id);return;}
  winOrder++;var id='win-'+winOrder;
  var w=window.innerWidth*0.5,h=window.innerHeight*0.5;
  var x=(window.innerWidth-w)/2,y=(window.innerHeight-h)/2;
  var win=document.createElement('div');win.className='window';win.id=id;
  win.style.left=x+'px';win.style.top=y+'px';win.style.width=w+'px';win.style.height=h+'px';
  var fname=filePath.split('/').filter(Boolean).pop();

    +'<span class="close" onclick="closeWindow(\''+id+'\')"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M2 2l4 4M6 2l-4 4" stroke="#4a0000" stroke-width="1.2" fill="none"/></svg></span>'
    +'<span class="min" onclick="minimizeWindow(\''+id+'\')"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M2 4h4" stroke="#6a5300" stroke-width="1.2"/></svg></span>'
    +'<span class="max" onclick="toggleMaximize(\''+id+'\')"><svg width="8" height="8" viewBox="0 0 8 8"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="#006000" stroke-width="1" fill="none"/></svg></span>'
    +'</div><div class="window-title"><svg class="ico"><use href="#ic-notes"/></svg> '+escHtml(fname)+'</div></div>'
    +'<div class="notes-toolbar" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.06)">'
    +'<button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="editorSave(\''+id+'\',\''+filePath+'\')"><svg class=\"ico\"><use href=\"#ic-save\"/></svg> 保存</button>'
    +'<span style="font-size:11px;color:var(--text-tertiary);margin-left:auto">'+escHtml(filePath)+'</span>'
    +'</div>'
    +'<textarea class="notes-editor" id="ed-'+id+'" style="flex:1;width:100%;resize:none;border:none;padding:12px;font-family:\'SF Mono\',\'Menlo\',monospace;font-size:13px;background:#0d1117;color:#c9d1d9;outline:none;height:calc(100% - 72px)">'+escHtml(content)+'</textarea>';

function editorSave(winId,filePath){

var calcS={};
function renderCalc(body,winId){
  body.innerHTML='<div class="calc-body"><div class="calc-display"><div class="calc-expr" id="ce-'+winId+'"></div><div class="calc-result" id="cr-'+winId+'">0</div></div><div class="calc-keys">'
    +['C','CE','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','.','⌫','='].map(function(k){
      var cls='calc-key';if('÷×−+%'.indexOf(k)!==-1)cls+=' op';if(k==='=')cls+=' eq';if(k==='C'||k==='CE')cls+=' clr';
      return '<button class="'+cls+'" onclick="cPress(\''+k+'\',\''+winId+'\')">'+k+'</button>';
    }).join('')+'</div></div>';
  body.setAttribute('tabindex','0');
  body.onkeydown=function(e){var k=e.key;if('0123456789.'.indexOf(k)!==-1)cPress(k,winId);else if('+-*/'.indexOf(k)!==-1)cPress(k==='*'?'×':k==='/'?'÷':k,winId);else if(k==='Enter'||k==='=')cPress('=',winId);else if(k==='Backspace')cPress('⌫',winId);else if(k==='Escape')cPress('C',winId);};
}
function cPress(k,id){
  if(!calcS[id])calcS[id]={e:'',v:'0',f:true};var s=calcS[id],r=document.getElementById('cr-'+id),ex=document.getElementById('ce-'+id);
  if('0123456789.'.indexOf(k)!==-1){if(s.f){s.v=k;s.f=false;}else s.v+=k;r.textContent=s.v;if(s.v.length>10)r.classList.add('shrink');else r.classList.remove('shrink');}
  else if('+−×÷%'.indexOf(k)!==-1){s.e+=s.v+' '+k+' ';s.f=true;ex.textContent=s.e;}
  else if(k==='='){if(!s.e)return;var full=s.e+s.v;try{var js=full.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');var result=eval(js);s.e=full+' =';ex.textContent=s.e;s.v=''+parseFloat(result.toFixed(8));r.textContent=s.v;s.f=true;}catch(e){r.textContent='错误';s.e='';s.v='0';s.f=true;}}
  else if(k==='C'){s.e='';s.v='0';s.f=true;r.textContent='0';ex.textContent='';r.classList.remove('shrink');}
  else if(k==='CE'){s.v='0';s.f=true;r.textContent='0';r.classList.remove('shrink');}
  else if(k==='⌫'){if(s.v.length>1){s.v=s.v.slice(0,-1);r.textContent=s.v;}else{s.v='0';r.textContent='0';}}
}

function applyAllSettings(){

  var d=document.getElementById('desktop');

  if(!ss.animations){d.style.setProperty('--dur-fast','0s');d.style.setProperty('--dur-normal','0s');d.style.setProperty('--dur-slow','0s');}
  else{d.style.removeProperty('--dur-fast');d.style.removeProperty('--dur-normal');d.style.removeProperty('--dur-slow');}

  else{d.style.removeProperty('--glass');d.style.removeProperty('--glass-strong');}

  else if(!ss.theme||ss.theme==='dark'){d.className=d.className.replace(/w\d/g,'').trim();}

}

function ssResetVFS(){
  if(!confirm('确定要清空所有 VFS 文件吗？此操作不可撤销！'))return;

  Object.keys(vDisk.dirs).forEach(function(k){if(k!=='/')delete vDisk.dirs[k];});
  localStorage.setItem('fus-vfs',JSON.stringify(vDisk));

  Object.keys(windows).forEach(function(id){if(windows[id]&&windows[id].app==='finder'){var body=document.getElementById('body-'+id);if(body)renderFinder(body,id);}});

var paints={};
function initPaint(id){
  var c=document.getElementById('pcanvas-'+id);if(!c)return;
  var wrap=c.parentElement,r=wrap.getBoundingClientRect();
  c.width=Math.min(r.width-20,800);c.height=Math.min(r.height-20,600);
  var p={canvas:c,ctx:c.getContext('2d'),tool:'pen',color:'#0078d4',size:4,drawing:false,undo:[],undoIdx:-1,sx:0,sy:0,layers:[c.getContext('2d').getImageData(0,0,c.width,c.height)]};
  paints[id]=p;
  c.addEventListener('mousedown',function(e){p.drawing=true;var rect=c.getBoundingClientRect();p.sx=e.clientX-rect.left;p.sy=e.clientY-rect.top;if(p.tool==='pen'||p.tool==='eraser'){p.undo.push(p.ctx.getImageData(0,0,c.width,c.height));p.undoIdx++;p.ctx.beginPath();p.ctx.moveTo(p.sx,p.sy);}});
  c.addEventListener('mousemove',function(e){if(!p.drawing)return;var rect=c.getBoundingClientRect();var x=e.clientX-rect.left,y=e.clientY-rect.top;document.getElementById('pcrd-'+id).textContent=Math.round(x)+', '+Math.round(y);
    if(p.tool==='pen'){p.ctx.strokeStyle=p.color;p.ctx.lineWidth=p.size;p.ctx.lineCap='round';p.ctx.lineJoin='round';p.ctx.lineTo(x,y);p.ctx.stroke();}
    else if(p.tool==='eraser'){p.ctx.strokeStyle='#FFFFFF';p.ctx.lineWidth=p.size*3;p.ctx.lineCap='round';p.ctx.lineTo(x,y);p.ctx.stroke();}});
  c.addEventListener('mouseup',function(e){if(!p.drawing)return;p.drawing=false;
    if(p.tool==='line'){p.undo.push(p.ctx.getImageData(0,0,c.width,c.height));p.undoIdx++;var rect=c.getBoundingClientRect();var x=e.clientX-rect.left,y=e.clientY-rect.top;p.ctx.beginPath();p.ctx.moveTo(p.sx,p.sy);p.ctx.lineTo(x,y);p.ctx.strokeStyle=p.color;p.ctx.lineWidth=p.size;p.ctx.stroke();}
    else if(p.tool==='rect'){p.undo.push(p.ctx.getImageData(0,0,c.width,c.height));p.undoIdx++;var rect=c.getBoundingClientRect();var x=e.clientX-rect.left,y=e.clientY-rect.top;p.ctx.strokeStyle=p.color;p.ctx.lineWidth=p.size;p.ctx.strokeRect(p.sx,p.sy,x-p.sx,y-p.sy);}
    else if(p.tool==='circle'){p.undo.push(p.ctx.getImageData(0,0,c.width,c.height));p.undoIdx++;var rect=c.getBoundingClientRect();var x=e.clientX-rect.left,y=e.clientY-rect.top;var rx=Math.abs(x-p.sx)/2,ry=Math.abs(y-p.sy)/2;var cx=Math.min(p.sx,x)+rx,cy=Math.min(p.sy,y)+ry;p.ctx.beginPath();p.ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);p.ctx.strokeStyle=p.color;p.ctx.lineWidth=p.size;p.ctx.stroke();}
    else if(p.tool==='fill'){p.undo.push(p.ctx.getImageData(0,0,c.width,c.height));p.undoIdx++;p.ctx.fillStyle=p.color;p.ctx.fillRect(0,0,c.width,c.height);}
    else if(p.tool==='text'){p.undo.push(p.ctx.getImageData(0,0,c.width,c.height));p.undoIdx++;var rect=c.getBoundingClientRect();var x=e.clientX-rect.left,y=e.clientY-rect.top;var txt=prompt('输入文字:','Hello');if(txt){p.ctx.font=p.size*3+'px sans-serif';p.ctx.fillStyle=p.color;p.ctx.fillText(txt,x,y);}}
  });
}
function ptSelect(id,tool,el){
  document.querySelectorAll('#body-'+id+' .paint-tool').forEach(function(b){b.classList.remove('active')});el.classList.add('active');
  paints[id].tool=tool;document.getElementById('pst-'+id).textContent=el.textContent.trim()+' • '+paints[id].size+'px';
}

/* ── CLOCK ── */
var clockStates={};
function renderClock(body,winId){
  var cs=clockStates[winId]||{tab:'clock',sw:{running:false,start:0,elapsed:0,laps:[]},tm:{running:false,total:0,remaining:0,interval:null}};
  clockStates[winId]=cs;
  body.innerHTML='<div class="clock-body">'
    +'<div class="clock-nav">'
    +'<button class="clock-tab '+(cs.tab==='clock'?'active':'')+'" onclick="clockSwitch(\''+winId+'\',\'clock\')"><svg class="ico" style="width:14px;height:14px"><use href="#ic-clock"/></svg> 时钟</button>'
    +'<button class="clock-tab '+(cs.tab==='stopwatch'?'active':'')+'" onclick="clockSwitch(\''+winId+'\',\'stopwatch\')"><svg class="ico" style="width:14px;height:14px"><use href="#ic-stopwatch"/></svg> 秒表</button>'
    +'<button class="clock-tab '+(cs.tab==='timer'?'active':'')+'" onclick="clockSwitch(\''+winId+'\',\'timer\')"><svg class="ico" style="width:14px;height:14px"><use href="#ic-timer"/></svg> 计时器</button>'
    +'</div>'
    +'<div id="clock-content-'+winId+'"></div></div>';
  clockRenderContent(winId);
  if(cs.tab==='clock')clockStartTicking(winId);
  if(cs.tab==='stopwatch'&&cs.sw.running)clockStartSW(winId);
}
function clockSwitch(winId,tab){
  var cs=clockStates[winId];if(!cs)return;
  if(cs.tm.interval)clearInterval(cs.tm.interval);
  cs.tab=tab;clockRenderContent(winId);
  document.querySelectorAll('#body-'+winId+' .clock-tab').forEach(function(b,i){
    b.classList.toggle('active',b.textContent.includes(tab==='clock'?'时钟':tab==='stopwatch'?'秒表':'计时器'));
  });
  if(tab==='clock')clockStartTicking(winId);
  if(tab==='stopwatch')renderStopwatchContent(winId);
  if(tab==='timer')renderTimerContent(winId);
}
function clockRenderContent(winId){
  var cs=clockStates[winId];if(!cs)return;
  if(cs.tab==='clock')renderClockContent(winId);
  else if(cs.tab==='stopwatch')renderStopwatchContent(winId);
  else if(cs.tab==='timer')renderTimerContent(winId);
}
function renderClockContent(winId){
  var now=new Date();
  var h=(''+now.getHours()).padStart(2,'0'),m=(''+now.getMinutes()).padStart(2,'0'),s=(''+now.getSeconds()).padStart(2,'0');
  var days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  var c=document.getElementById('clock-content-'+winId);if(!c)return;
  c.innerHTML='<div class="clock-digital">'
    +'<div class="clock-big-time" id="clk-time-'+winId+'">'+h+':'+m+'<span style="font-size:32px;color:var(--text-tertiary)">:'+s+'</span></div>'
    +'<div class="clock-date-str">'+now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日</div>'
    +'<div class="clock-day-str">'+days[now.getDay()]+'</div></div>';
}
function clockStartTicking(winId){
  if(clockStates[winId]&&clockStates[winId]._tickInt)clearInterval(clockStates[winId]._tickInt);
  clockStates[winId]._tickInt=setInterval(function(){
    if(!clockStates[winId]||clockStates[winId].tab!=='clock'){clearInterval(clockStates[winId]._tickInt);return;}
    renderClockContent(winId);
  },1000);
}
function renderStopwatchContent(winId){
  var cs=clockStates[winId];if(!cs)return;
  var sw=cs.sw,d=sw.elapsed;
  var c=document.getElementById('clock-content-'+winId);if(!c)return;
  var laps=sw.laps.slice().reverse().map(function(l,i){return'<div class="clock-sw-lap-item"><span>圈 '+(sw.laps.length-i)+'</span><span>'+fmtSW(l)+'</span></div>'}).join('');
  c.innerHTML='<div class="clock-stopwatch">'
    +'<div class="clock-sw-display" id="clk-sw-'+winId+'">'+fmtSW(d)+'</div>'
    +'<div class="clock-btn-row">'
    +(sw.running
      ?'<button class="clock-btn primary" onclick="clockSWLap(\''+winId+'\')">计圈</button><button class="clock-btn danger" onclick="clockSWStop(\''+winId+'\')">停止</button>'
      :'<button class="clock-btn primary" onclick="clockSWStart(\''+winId+'\')">开始</button><button class="clock-btn" onclick="clockSWReset(\''+winId+'\')">重置</button>')
    +'</div>'
    +(laps?'<div class="clock-sw-laps">'+laps+'</div>':'')
    +'</div>';
  if(sw.running)clockStartSW(winId);
}
function fmtSW(ms){var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return ('0'+m).slice(-2)+':'+('0'+s).slice(-2)+'.'+('0'+cs).slice(-2);}
function clockSWStart(id){
  var cs=clockStates[id];if(!cs)return;
  cs.sw.running=true;cs.sw.start=Date.now()-cs.sw.elapsed;
  clockStartSW(id);renderStopwatchContent(id);
}
function clockStartSW(id){
  if(clockStates[id]&&clockStates[id]._swInt)clearInterval(clockStates[id]._swInt);
  clockStates[id]._swInt=setInterval(function(){
    var cs=clockStates[id];if(!cs||!cs.sw.running)return;
    cs.sw.elapsed=Date.now()-cs.sw.start;
    var el=document.getElementById('clk-sw-'+id);if(el)el.textContent=fmtSW(cs.sw.elapsed);
  },50);
}
function clockSWStop(id){
  var cs=clockStates[id];if(!cs)return;
  cs.sw.running=false;if(cs._swInt)clearInterval(cs._swInt);
  renderStopwatchContent(id);
}
function clockSWReset(id){
  var cs=clockStates[id];if(!cs)return;
  cs.sw.running=false;if(cs._swInt)clearInterval(cs._swInt);
  cs.sw.elapsed=0;cs.sw.laps=[];renderStopwatchContent(id);
}
function clockSWLap(id){
  var cs=clockStates[id];if(!cs)return;
  cs.sw.laps.push(cs.sw.elapsed);renderStopwatchContent(id);
}
function renderTimerContent(winId){
  var cs=clockStates[winId];if(!cs)return;
  var tm=cs.tm;
  var c=document.getElementById('clock-content-'+winId);if(!c)return;
  var cls='';
  if(tm.running)cls='running';else if(tm.done)cls='done';
  c.innerHTML='<div class="clock-timer">'
    +'<div class="clock-tm-display '+cls+'" id="clk-tm-'+winId+'">'+fmtTMR(tm.remaining||tm.total)+'</div>'
    +(tm.running||tm.done
      ?'<div class="clock-btn-row"><button class="clock-btn danger" onclick="clockTMReset(\''+winId+'\')">取消</button></div>'
      :'<div class="clock-tm-input"><input id="clk-tmm-'+winId+'" value="0" maxlength="3" oninput="this.value=this.value.replace(/\\D/g,\'\').slice(0,3)" placeholder="分">'
      +'<span>:</span>'
      +'<input id="clk-tms-'+winId+'" value="0" maxlength="2" oninput="var v=parseInt(this.value)||0;if(v>59)this.value=59;this.value=this.value.replace(/\\D/g,\'\')" placeholder="秒">'
      +'</div>'
      +'<div class="clock-btn-row"><button class="clock-btn primary" onclick="clockTMStart(\''+winId+'\')">开始计时</button></div>')
    +'</div>';
}
function fmtTMR(s){var m=Math.floor(s/60),sec=s%60;return ('0'+m).slice(-2)+':'+('0'+sec).slice(-2);}
function clockTMStart(id){
  var cs=clockStates[id];if(!cs)return;
  var mm=parseInt(document.getElementById('clk-tmm-'+id).value)||0;
  var ss=parseInt(document.getElementById('clk-tms-'+id).value)||0;
  var total=mm*60+ss;
  if(total<=0){showToast('err','计时器','请设置大于 0 的时间');return;}
  cs.tm.total=total;cs.tm.remaining=total;cs.tm.running=true;cs.tm.done=false;
  renderTimerContent(id);
  var el=document.getElementById('clk-tm-'+id);
  cs.tm.interval=setInterval(function(){
    cs.tm.remaining--;
    if(el)el.textContent=fmtTMR(cs.tm.remaining);
    if(cs.tm.remaining<=0){
      clearInterval(cs.tm.interval);
      cs.tm.running=false;cs.tm.done=true;
      renderTimerContent(id);
      showToast('info','计时器','⏰ 时间到！');
      try{if(window.Audio){var a=new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+AgH9/f3+Af39/gIB/f39/gH9/f4CAf39/f4B/f3+AgH9/f3+Af39/gIB/f39/gH9/f4CAf39/f4B/f3+AgH9/f3+Af39/gIB/f39/gH9/f4CAf39/fw==');a.play().catch(function(){})}}catch(e){}
    }
  },1000);
}
function clockTMReset(id){
  var cs=clockStates[id];if(!cs)return;
  if(cs.tm.interval)clearInterval(cs.tm.interval);
  cs.tm.running=false;cs.tm.done=false;cs.tm.remaining=0;
  renderTimerContent(id);
}

/* ── CALENDAR ── */
var calStates={};
function renderCalendar(body,winId){
  var cs=calStates[winId]||{year:new Date().getFullYear(),month:new Date().getMonth()};
  calStates[winId]=cs;
  body.innerHTML='<div class="cal-body" id="cal-view-'+winId+'"></div>';
  renderCalView(winId);
}
function getCalEvts(y,m,d){
  var mm=('0'+(m+1)).slice(-2),dd=('0'+d).slice(-2);
  return CAL_EVENTS[mm+'-'+dd]||[];
}
function renderCalView(winId){
  var cs=calStates[winId];if(!cs)return;
  var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var fd=new Date(cs.year,cs.month,1),ld=new Date(cs.year,cs.month+1,0);
  var startD=fd.getDay(),totalD=ld.getDate();
  var prevLD=new Date(cs.year,cs.month,0).getDate();
  var wds=['日','一','二','三','四','五','六'];
  var months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var isToday=(now.getFullYear()===cs.year&&now.getMonth()===cs.month);

  // 收集本月事件列表
  var monthEvts=[];
  for(var d=1;d<=totalD;d++){
    var evs=getCalEvts(cs.year,cs.month,d);
    evs.forEach(function(e){monthEvts.push({d:d,n:e.n,t:e.t});});
  }
  monthEvts.sort(function(a,b){return a.d-b.d;});

  var h='<div class="cal-header">'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<button class="cal-nav-btn" onclick="calPrevMonth(\''+winId+'\')">&lt;</button>'
    +'<span class="cal-month-label">'+cs.year+'年 '+months[cs.month]+'</span>'
    +'<button class="cal-nav-btn" onclick="calNextMonth(\''+winId+'\')">&gt;</button>'
    +'</div>'
    +'<button class="cal-today-btn" onclick="calGoToday(\''+winId+'\')">今天</button>'
    +'</div>'
    +'<div class="cal-legend">'
    +'<span class="cal-legend-item"><span class="cal-legend-dot" style="background:#30D158"></span> 节气</span>'
    +'<span class="cal-legend-item"><span class="cal-legend-dot" style="background:#FF453A"></span> 假期</span>'
    +'<span class="cal-legend-item"><span class="cal-legend-dot" style="background:#FF9F0A"></span> 节日</span>'
    +'<span class="cal-legend-item"><span class="cal-legend-dot" style="background:#AF52FA"></span> 纪念日</span>'
    +'</div>'
    +'<div class="cal-grid">'
    +wds.map(function(w,i){return'<div class="cal-weekday'+(i===0||i===6?' wkend':'')+'">'+w+'</div>'}).join('');

  // 前月填充日
  for(var i=startD-1;i>=0;i--){
    var pd=prevLD-i;
    h+='<div class="cal-day dim"><span class="cal-day-num">'+pd+'</span></div>';
  }

  // 当月日期
  var selKey=cs.selected?cs.selected.getFullYear()+'-'+('0'+(cs.selected.getMonth()+1)).slice(-2)+'-'+('0'+cs.selected.getDate()).slice(-2):'';
  for(var i=1;i<=totalD;i++){
    var cls='cal-day';
    if(isToday&&i===now.getDate())cls+=' today';
    var dObj=new Date(cs.year,cs.month,i);
    var dtKey=cs.year+'-'+('0'+(cs.month+1)).slice(-2)+'-'+('0'+i).slice(-2);
    if(dtKey===selKey)cls+=' selected';
    var evs=getCalEvts(cs.year,cs.month,i);
    var tags='';
    evs.forEach(function(e){tags+='<span class="cal-ev-tag '+e.t+'">'+e.n+'</span>';});
    var titleStr=evs.length?evs.map(function(e){return TYPE_LABEL[e.t]+': '+e.n}).join('&#10;'):dtKey;
    h+='<div class="'+cls+'" onclick="calSelectDay(\''+winId+'\',\''+dtKey+'\')" title="'+titleStr+'"><span class="cal-day-num">'+i+'</span>'+tags+'</div>';
  }

  // 后月填充日
  var rem=7-((startD+totalD)%7);if(rem===7)rem=0;
  for(var i=1;i<=rem;i++){h+='<div class="cal-day dim"><span class="cal-day-num">'+i+'</span></div>';}
  h+='</div>';

  // 已选日期详情
  if(cs.selected){
    var sdKey=cs.selected.getFullYear()+'-'+('0'+(cs.selected.getMonth()+1)).slice(-2)+'-'+('0'+cs.selected.getDate()).slice(-2);
    var sev=getCalEvts(cs.selected.getFullYear(),cs.selected.getMonth(),cs.selected.getDate());
    h+='<div class="cal-selected-info">'
      +'<div class="cal-selected-date">📅 '+cs.selected.getFullYear()+'年'+(cs.selected.getMonth()+1)+'月'+cs.selected.getDate()+'日 '
      +wds[cs.selected.getDay()]+'</div>';
    if(sev.length){
      h+='<div class="cal-selected-events">'
        +sev.map(function(e){return'<div class="cal-selected-ev"><span class="cal-ev-dot '+e.t+'"></span>'+TYPE_LABEL[e.t]+'：'+e.n+'</div>'}).join('')
        +'</div>';
    }else{
      h+='<div class="cal-selected-events" style="opacity:0.5">无特殊事件</div>';
    }
    h+='</div>';
  }

  // 本月事件列表
  h+='<div class="cal-events-panel" id="cal-evtlist-'+winId+'">';
  if(monthEvts.length){
    h+='<div class="cal-events-title"><svg class="ico" style="width:12px;height:12px"><use href="#ic-cal-grid"/></svg> '+months[cs.month]+'重要日期 ('+monthEvts.length+')</div>';
    monthEvts.forEach(function(e){
      var dd=('0'+e.d).slice(-2);
      h+='<div class="cal-ev-item"><span class="cal-ev-dot '+e.t+'"></span><span class="cal-ev-date">'+dd+'日</span><span class="cal-ev-name">'+e.n+'</span><span class="cal-ev-type-tag '+e.t+'">'+TYPE_LABEL[e.t]+'</span></div>';
    });
  }else{
    h+='<div class="cal-events-title">本月无特殊记录</div>';
  }
  h+='</div>';

  var v=document.getElementById('cal-view-'+winId);if(v)v.innerHTML=h;
}
function calPrevMonth(id){
  var cs=calStates[id];if(!cs)return;
  cs.month--;if(cs.month<0){cs.month=11;cs.year--;}cs.selected=null;renderCalView(id);
}
function calNextMonth(id){
  var cs=calStates[id];if(!cs)return;
  cs.month++;if(cs.month>11){cs.month=0;cs.year++;}cs.selected=null;renderCalView(id);
}
function calGoToday(id){
  var now=new Date();
  calStates[id]={year:now.getFullYear(),month:now.getMonth(),selected:null};
  renderCalView(id);
}
function calSelectDay(id,dateStr){
  var cs=calStates[id];if(!cs)return;
  cs.selected=new Date(dateStr+'T00:00:00');
  renderCalView(id);
}

    +'</div>'

function monDrawCPU(winId,hist){
  var c=document.getElementById('mon-cpu-graph-'+winId);if(!c)return;
  var ctx=c.getContext('2d'),w=c.width=c.offsetWidth,h=c.height=c.offsetHeight;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,120,212,0.8)';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();
  for(var i=0;i<hist.length;i++){
    var x=(i/(hist.length-1))*w,y=h-(hist[i]/100)*h;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  var grd=ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0,'rgba(0,120,212,0.25)');grd.addColorStop(1,'rgba(0,120,212,0)');
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=grd;ctx.fill();
}

var snakeState={};
function renderSnake(body,winId){
  var ss=snakeState[winId]||{board:20,score:0,high:parseInt(localStorage.getItem('snake-high')||'0'),running:false,over:false};
  snakeState[winId]=ss;
  body.innerHTML='<div class="snake-body" id="sn-body-'+winId+'">'
    +'<div class="snake-stats"><div class="snake-stat"><div class="snake-stat-val" id="ss-score-'+winId+'">'+ss.score+'</div><div class="snake-stat-label">得分</div></div><div class="snake-stat"><div class="snake-stat-val">'+ss.high+'</div><div class="snake-stat-label">最高</div></div></div>'
    +'<div class="snake-board"><canvas id="sn-canvas-'+winId+'" width="400" height="400"></canvas></div>'
    +(ss.running?'<div class="snake-hint">方向键控制 | 空格暂停</div>':'<button class="snake-ctrl-btn" onclick="snakeStart(\''+winId+'\')">开始游戏</button>')
    +(ss.over?'<div style="color:var(--danger);font-size:14px;margin-top:8px">游戏结束！得分: '+ss.score+'</div>':'')
    +'</div>';
  if(!ss.running)snakeDrawBoard(winId);
  body.setAttribute('tabindex','0');
  body.onkeydown=function(e){snakeKey(e,winId)};
  setTimeout(function(){body.focus();},100);
}
function snakeDrawBoard(id){
  var ss=snakeState[id];if(!ss)return;
  var c=document.getElementById('sn-canvas-'+id);if(!c)return;
  var ctx=c.getContext('2d'),s=c.width/ss.board;
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  for(var i=0;i<ss.board;i++){for(var j=0;j<ss.board;j++){ctx.strokeRect(i*s,j*s,s,s);}}
  if(ss.snake&&ss.food){
    ss.snake.forEach(function(seg,i){ctx.fillStyle=i===0?'#30D158':'rgba(48,209,88,'+(1-i*0.05)+')';ctx.fillRect(seg.x*s+1,seg.y*s+1,s-2,s-2);});
    ctx.fillStyle='#FF2D55';ctx.beginPath();ctx.arc(ss.food.x*s+s/2,ss.food.y*s+s/2,s/2-1,0,Math.PI*2);ctx.fill();
  }
}
function snakeStart(id){
  var ss=snakeState[id];ss.running=true;ss.over=false;ss.score=0;ss.dir={x:1,y:0};ss.pendingDir=null;
  ss.snake=[];var c=Math.floor(ss.board/2);
  for(var i=0;i<3;i++){ss.snake.push({x:c-i,y:c});}
  ss.food=snakeSpawnFood(id);
  snakeDrawBoard(id);
  ss._int=setInterval(function(){snakeTick(id)},120);
  var b=document.getElementById('body-'+id);
  if(b){b.querySelector('.snake-body').innerHTML='<div class="snake-stats"><div class="snake-stat"><div class="snake-stat-val" id="ss-score-'+id+'">0</div><div class="snake-stat-label">得分</div></div><div class="snake-stat"><div class="snake-stat-val">'+ss.high+'</div><div class="snake-stat-label">最高</div></div></div><div class="snake-board"><canvas id="sn-canvas-'+id+'" width="400" height="400"></canvas></div><div class="snake-hint">方向键控制 | 空格暂停</div>';}
  setTimeout(function(){if(b)b.focus()},50);
}
function snakeSpawnFood(id){
  var ss=snakeState[id],pos;
  do{pos={x:Math.floor(Math.random()*ss.board),y:Math.floor(Math.random()*ss.board)};}
  while(ss.snake.some(function(s){return s.x===pos.x&&s.y===pos.y}));
  return pos;
}
function snakeTick(id){
  var ss=snakeState[id];if(!ss||!ss.running)return;
  if(ss.pendingDir){ss.dir=ss.pendingDir;ss.pendingDir=null;}
  var head=ss.snake[0],nx=head.x+ss.dir.x,ny=head.y+ss.dir.y;
  if(nx<0||nx>=ss.board||ny<0||ny>=ss.board||ss.snake.some(function(s){return s.x===nx&&s.y===ny})){
    ss.running=false;ss.over=true;clearInterval(ss._int);
    if(ss.score>ss.high){ss.high=ss.score;localStorage.setItem('snake-high',ss.high);}
    var b=document.getElementById('body-'+id);if(b)renderSnake(b,id);
    showToast('info','贪吃蛇','游戏结束！得分: '+ss.score);
    return;
  }
  ss.snake.unshift({x:nx,y:ny});
  if(nx===ss.food.x&&ny===ss.food.y){ss.score+=10;ss.food=snakeSpawnFood(id);document.getElementById('ss-score-'+id).textContent=ss.score;}
  else{ss.snake.pop();}
  snakeDrawBoard(id);
}
function snakeKey(e,id){
  var ss=snakeState[id];if(!ss||!ss.running)return;
  var k=e.key;
  if(k===' '||k==='Spacebar'){e.preventDefault();return;}
  var nd=null;
  if(k==='ArrowUp'||k==='w')nd={x:0,y:-1};
  else if(k==='ArrowDown'||k==='s')nd={x:0,y:1};
  else if(k==='ArrowLeft'||k==='a')nd={x:-1,y:0};
  else if(k==='ArrowRight'||k==='d')nd={x:1,y:0};
  if(nd&&!(nd.x===-ss.dir.x&&nd.y===-ss.dir.y)){ss.pendingDir=nd;e.preventDefault();}
}

/* ── Minesweeper ── */
var mineState = {};
function renderMinesweeper(body, winId) {
  if (!mineState[winId]) {
    var rows = 9, cols = 9, mines = 10;
    var board = []; for (var r = 0; r < rows; r++) { board[r] = []; for (var c = 0; c < cols; c++) board[r][c] = 0; }
    var placed = 0; while (placed < mines) { var rr = Math.floor(Math.random() * rows); var cc = Math.floor(Math.random() * cols); if (board[rr][cc] !== -1) { board[rr][cc] = -1; placed++; } }
    for (var r = 0; r < rows; r++) { for (var c = 0; c < cols; c++) { if (board[r][c] === -1) continue; var cnt = 0; for (var dr = -1; dr <= 1; dr++) { for (var dc = -1; dc <= 1; dc++) { var nr = r + dr; var nc = c + dc; if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) cnt++; } } board[r][c] = cnt; } }
    mineState[winId] = { board: board, revealed: {}, flagged: {}, gameOver: false, won: false, rows: rows, cols: cols, mines: mines, started: false, timer: 0, timerId: null, firstClick: true };
  }
  var ms = mineState[winId];
  body.innerHTML = '<div class="mine-wrap">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,0,0,0.2);border-radius:6px;margin-bottom:8px">' +
    '<span style="color:#ff6b6b">\u{1F4A3} ' + (ms.mines - Object.keys(ms.flagged).filter(function(k) { return ms.flagged[k]; }).length) + '</span>' +
    '<span style="color:var(--accent);font-size:18px;font-weight:600" id="mine-timer-' + winId + '">' + String(ms.timer).padStart(3, '0') + '</span>' +
    '<button onclick="mineRestart(\'' + winId + '\')" style="font-size:18px;background:none;border:none;cursor:pointer;color:#fff">\u{1F504}</button>' +
    '</div>' +
    '<div class="mine-board" id="mine-board-' + winId + '" style="display:grid;grid-template-columns:repeat(' + ms.cols + ',32px);gap:2px;justify-content:center">';
  for (var r = 0; r < ms.rows; r++) {
    for (var c = 0; c < ms.cols; c++) {
      var key = r + ',' + c;
      var revealed = ms.revealed[key];
      var flagged = ms.flagged[key];
      var cls = 'mine-cell';
      if (revealed) { cls += ' revealed'; if (ms.board[r][c] === -1) cls += ' mine'; else cls += ' n' + ms.board[r][c]; }
      if (flagged) cls += ' flagged';
      body.innerHTML += '<div class="' + cls + '" onclick="mineClick(\'' + winId + '\',' + r + ',' + c + ')" oncontextmenu="mineFlag(\'' + winId + '\',' + r + ',' + c + ');return false">' + (revealed ? (ms.board[r][c] === -1 ? '\u{1F4A3}' : (ms.board[r][c] || '')) : (flagged ? '\u{1F6A9}' : '')) + '</div>';
    }
  }
  body.innerHTML += '</div>';
  if (ms.gameOver) body.innerHTML += '<div style="text-align:center;padding:10px;color:#ff6b6b;font-size:14px;font-weight:600">\u{1F4A5} \u6E38\u620F\u7ED3\u675F</div>';
  if (ms.won) body.innerHTML += '<div style="text-align:center;padding:10px;color:#51cf66;font-size:14px;font-weight:600">\u{1F389} \u4F60\u8D62\u4E86!</div>';
  body.innerHTML += '</div>';
}

function mineClick(winId, r, c) {
  var ms = mineState[winId]; if (!ms || ms.gameOver || ms.won) return;
  var key = r + ',' + c;
  if (ms.flagged[key]) return;
  if (ms.firstClick) { ms.firstClick = false; ms.started = true; ms.timerId = setInterval(function() { ms.timer++; var el = document.getElementById('mine-timer-' + winId); if (el) el.textContent = String(ms.timer).padStart(3, '0'); }, 1000); }
  if (ms.board[r][c] === -1) {
    ms.revealed[key] = true; ms.gameOver = true;
    for (var rr = 0; rr < ms.rows; rr++) for (var cc = 0; cc < ms.cols; cc++) if (ms.board[rr][cc] === -1) ms.revealed[rr + ',' + cc] = true;
    if (ms.timerId) clearInterval(ms.timerId);
  } else {
    var stack = [{ r: r, c: c }];
    while (stack.length) {
      var p = stack.pop(); var k = p.r + ',' + p.c;
      if (ms.revealed[k] || ms.flagged[k]) continue;
      ms.revealed[k] = true;
      if (ms.board[p.r][p.c] === 0) {
        for (var dr = -1; dr <= 1; dr++) { for (var dc = -1; dc <= 1; dc++) { var nr = p.r + dr; var nc = p.c + dc; if (nr >= 0 && nr < ms.rows && nc >= 0 && nc < ms.cols) stack.push({ r: nr, c: nc }); } }
      }
    }
  }
  var revealed = 0; for (var rr = 0; rr < ms.rows; rr++) for (var cc = 0; cc < ms.cols; cc++) if (ms.revealed[rr + ',' + cc]) revealed++;
  if (revealed === ms.rows * ms.cols - ms.mines && !ms.gameOver) { ms.won = true; if (ms.timerId) clearInterval(ms.timerId); }
  var b = document.getElementById('body-' + winId); if (b) renderMinesweeper(b, winId);
}

function mineFlag(winId, r, c) {
  var ms = mineState[winId]; if (!ms || ms.gameOver || ms.won) return;
  var key = r + ',' + c;
  if (ms.revealed[key]) return;
  ms.flagged[key] = !ms.flagged[key];
  var b = document.getElementById('body-' + winId); if (b) renderMinesweeper(b, winId);
}

function mineRestart(winId) {
  var ms = mineState[winId]; if (!ms) return;
  if (ms.timerId) clearInterval(ms.timerId);
  delete mineState[winId];
  var b = document.getElementById('body-' + winId); if (b) renderMinesweeper(b, winId);
}

/* ── Tetris ── */
var tetrisState = {};
var TETRIS_PIECES = [
  { shape: [[1,1,1,1]], color: '#00f5ff' },
  { shape: [[1,1],[1,1]], color: '#ffd700' },
  { shape: [[0,1,0],[1,1,1]], color: '#ab47bc' },
  { shape: [[1,0,0],[1,1,1]], color: '#42a5f5' },
  { shape: [[0,0,1],[1,1,1]], color: '#ffa726' },
  { shape: [[0,1,1],[1,1,0]], color: '#66bb6a' },
  { shape: [[1,1,0],[0,1,1]], color: '#ef5350' }
];
function renderTetris(body, winId) {
  if (!tetrisState[winId]) {
    tetrisState[winId] = { board: [], piece: null, pieceX: 0, pieceY: 0, score: 0, gameOver: false, paused: false, dropId: null, cols: 10, rows: 20 };
    var ts = tetrisState[winId];
    for (var r = 0; r < ts.rows; r++) { ts.board[r] = []; for (var c = 0; c < ts.cols; c++) ts.board[r][c] = 0; }
    tetrisSpawn(winId);
  }
  var ts = tetrisState[winId];
  body.innerHTML = '<div class="tetris-wrap" style="display:flex;gap:16px;justify-content:center;padding:12px">' +
    '<canvas id="tetris-canvas-' + winId + '" width="' + (ts.cols * 28) + '" height="' + (ts.rows * 28) + '" style="border:2px solid rgba(255,255,255,0.2);border-radius:4px;background:rgba(0,0,0,0.3)"></canvas>' +
    '<div style="display:flex;flex-direction:column;gap:12px;min-width:100px">' +
    '<div style="background:rgba(0,0,0,0.2);padding:10px;border-radius:6px;text-align:center"><div style="font-size:11px;color:var(--text-tertiary)">分数</div><div style="font-size:22px;font-weight:700;color:var(--accent)">' + ts.score + '</div></div>' +
    '<div style="background:rgba(0,0,0,0.2);padding:10px;border-radius:6px;text-align:center"><div style="font-size:11px;color:var(--text-tertiary)">下一个</div><canvas id="tetris-next-' + winId + '" width="112" height="84" style="margin-top:4px"></canvas></div>' +
    '<button onclick="tetrisMove(\'' + winId + '\',\'left\')" style="padding:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;cursor:pointer">\u25C0</button>' +
    '<button onclick="tetrisMove(\'' + winId + '\',\'right\')" style="padding:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;cursor:pointer">\u25B6</button>' +
    '<button onclick="tetrisMove(\'' + winId + '\',\'rotate\')" style="padding:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;cursor:pointer">\u{1F504}</button>' +
    '<button onclick="tetrisMove(\'' + winId + '\',\'drop\')" style="padding:6px;background:var(--accent);border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:600">\u{2B07} 硬降</button>' +
    '<button onclick="tetrisRestart(\'' + winId + '\')" style="padding:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;cursor:pointer">重新开始</button>' +
    '</div></div>';

}

function tetrisSpawn(winId) {
  var ts = tetrisState[winId]; if (!ts) return;
  var p = TETRIS_PIECES[Math.floor(Math.random() * TETRIS_PIECES.length)];
  ts.piece = p.shape.map(function(r) { return r.slice(); });
  ts.pieceColor = p.color;
  ts.pieceX = Math.floor((ts.cols - ts.piece[0].length) / 2);
  ts.pieceY = 0;
  if (!tetrisValid(winId, ts.piece, ts.pieceX, ts.pieceY)) { ts.gameOver = true; if (ts.dropId) { clearInterval(ts.dropId); ts.dropId = null; } }
}

function tetrisValid(winId, piece, px, py) {
  var ts = tetrisState[winId];
  for (var r = 0; r < piece.length; r++) {
    for (var c = 0; c < piece[r].length; c++) {
      if (piece[r][c]) { var x = px + c; var y = py + r; if (x < 0 || x >= ts.cols || y >= ts.rows) return false; if (y >= 0 && ts.board[y][x]) return false; }
    }
  }

}

function tetrisMove(winId, dir) {
  var ts = tetrisState[winId]; if (!ts || ts.gameOver || ts.paused) return;
  var nx = ts.pieceX, ny = ts.pieceY, piece = ts.piece;
  if (dir === 'left') nx--;
  else if (dir === 'right') nx++;
  else if (dir === 'down') ny++;
  else if (dir === 'rotate') { var rot = piece[0].map(function(_, i) { return piece.map(function(r) { return r[i]; }).reverse(); }); if (tetrisValid(winId, rot, ts.pieceX, ts.pieceY)) ts.piece = rot; }
  else if (dir === 'drop') { while (tetrisValid(winId, ts.piece, ts.pieceX, ts.pieceY + 1)) ts.pieceY++; tetrisPlace(winId); }

  if (dir !== 'rotate' && dir !== 'drop') {
    if (tetrisValid(winId, piece, nx, ny)) { ts.pieceX = nx; ts.pieceY = ny; }
    else if (dir === 'down') tetrisPlace(winId);
  }
  var b = document.getElementById('body-' + winId); if (b && ts.gameOver) { renderTetris(b, winId); return; }
  tetrisDraw(winId);
}

function tetrisPlace(winId) {
  var ts = tetrisState[winId];
  for (var r = 0; r < ts.piece.length; r++) {
    for (var c = 0; c < ts.piece[r].length; c++) {
      if (ts.piece[r][c]) { var y = ts.pieceY + r; var x = ts.pieceX + c; if (y >= 0 && y < ts.rows && x >= 0 && x < ts.cols) ts.board[y][x] = ts.pieceColor; }
    }
  }
  var cleared = 0;
  for (var r = ts.rows - 1; r >= 0; r--) {
    if (ts.board[r].every(function(c) { return c; })) { ts.board.splice(r, 1); ts.board.unshift(new Array(ts.cols).fill(0)); cleared++; r++; }
  }
  if (cleared) ts.score += cleared * cleared * 100;
  tetrisSpawn(winId);
}

function tetrisDraw(winId) {
  var ts = tetrisState[winId]; if (!ts) return;
  var cvs = document.getElementById('tetris-canvas-' + winId); if (!cvs) return;
  var ctx = cvs.getContext('2d');
  var cs = 28;
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, ts.cols * cs, ts.rows * cs);
  for (var r = 0; r < ts.rows; r++) {
    for (var c = 0; c < ts.cols; c++) {
      if (ts.board[r][c]) { ctx.fillStyle = ts.board[r][c]; ctx.fillRect(c * cs + 1, r * cs + 1, cs - 2, cs - 2); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(c * cs + 1, r * cs + 1, cs - 2, 3); }
    }
  }
  if (ts.piece && !ts.gameOver) {
    ctx.fillStyle = ts.pieceColor;
    for (var r = 0; r < ts.piece.length; r++) {
      for (var c = 0; c < ts.piece[r].length; c++) {
        if (ts.piece[r][c]) { var y = ts.pieceY + r; if (y >= 0) { ctx.fillRect((ts.pieceX + c) * cs + 1, y * cs + 1, cs - 2, cs - 2); ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect((ts.pieceX + c) * cs + 1, y * cs + 1, cs - 2, 3); ctx.fillStyle = ts.pieceColor; } }
      }
    }
  }
  var ncv = document.getElementById('tetris-next-' + winId);
  if (ncv && ts._nextPiece) {
    var nctx = ncv.getContext('2d'); nctx.clearRect(0, 0, 112, 84);
  }

function tetrisRestart(winId) {
  var ts = tetrisState[winId]; if (!ts) return;
  if (ts.dropId) clearInterval(ts.dropId);
  delete tetrisState[winId];
  var b = document.getElementById('body-' + winId); if (b) renderTetris(b, winId);
}

/* ── Breakout ── */
var breakoutState = {};
function renderBreakout(body, winId) {
  if (!breakoutState[winId]) {

    breakoutState[winId] = {
      bricks: bricks, paddleX: 150, ballX: 200, ballY: 250, ballDX: 3, ballDY: -3,

    '<canvas id="breakout-canvas-' + winId + '" width="' + bs.canvasW + '" height="' + bs.canvasH + '" style="border:2px solid rgba(255,255,255,0.2);border-radius:4px;background:rgba(0,0,0,0.3);cursor:none"></canvas>' +
    '<div style="display:flex;gap:8px">' +
    '<button onclick="breakoutAction(\'' + winId + '\',\'start\')" style="padding:6px 16px;background:var(--accent);border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:600">' + (bs.running ? '\u23F8 \u6682\u505C' : '\u25B6 \u5F00\u59CB') + '</button>' +
    '<button onclick="breakoutAction(\'' + winId + '\',\'restart\')" style="padding:6px 16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;cursor:pointer">\u{1F504} \u91CD\u65B0\u5F00\u59CB</button></div>' +
    '</div>';

function breakoutDraw(winId) {
  var bs = breakoutState[winId]; if (!bs) return;
  var cvs = document.getElementById('breakout-canvas-' + winId); if (!cvs) return;
  var ctx = cvs.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, bs.canvasW, bs.canvasH);
  var colors = ['#ff6b6b', '#ffa726', '#ffd700', '#66bb6a', '#42a5f5'];
  var bw = bs.canvasW / bs.cols - 4, bh = 16;
  for (var r = 0; r < bs.rows; r++) {
    for (var c = 0; c < bs.cols; c++) {
      if (bs.bricks[r][c]) { ctx.fillStyle = colors[r % colors.length]; ctx.fillRect(c * (bw + 4) + 2, r * (bh + 4) + 20, bw, bh); }
    }
  }
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bs.ballX, bs.ballY, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#0078d4'; ctx.fillRect(bs.paddleX, bs.canvasH - 25, 100, 12);
  if (!bs.running && !bs.gameOver && !bs.won) { ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('\u70B9\u51FB\u5F00\u59CB\u6E38\u620F', bs.canvasW / 2, bs.canvasH / 2); }
  if (bs.gameOver) { ctx.fillStyle = '#ff6b6b'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('\u6E38\u620F\u7ED3\u675F', bs.canvasW / 2, bs.canvasH / 2); }
  if (bs.won) { ctx.fillStyle = '#51cf66'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('\u{1F389} \u4F60\u8D62\u4E86!', bs.canvasW / 2, bs.canvasH / 2); }
}

function breakoutUpdate(winId) {
  var bs = breakoutState[winId]; if (!bs || !bs.running || bs.gameOver || bs.won) return;
  bs.ballX += bs.ballDX; bs.ballY += bs.ballDY;
  if (bs.ballX - 6 <= 0 || bs.ballX + 6 >= bs.canvasW) bs.ballDX = -bs.ballDX;
  if (bs.ballY - 6 <= 0) bs.ballDY = -bs.ballDY;
  if (bs.ballY + 6 >= bs.canvasH) { bs.lives--; bs.ballX = 200; bs.ballY = 250; bs.ballDX = 3; bs.ballDY = -3; bs.running = false; if (bs.lives <= 0) { bs.gameOver = true; if (bs.loopId) { clearInterval(bs.loopId); bs.loopId = null; } } }
  if (bs.ballY + 6 >= bs.canvasH - 25 && bs.ballX > bs.paddleX && bs.ballX < bs.paddleX + 100) { bs.ballDY = -Math.abs(bs.ballDY); bs.ballDX += (bs.ballX - bs.paddleX - 50) / 10; }
  var bw = bs.canvasW / bs.cols - 4, bh = 16;
  for (var r = 0; r < bs.rows; r++) {
    for (var c = 0; c < bs.cols; c++) {
      if (!bs.bricks[r][c]) continue;
      var bx = c * (bw + 4) + 2, by = r * (bh + 4) + 20;
      if (bs.ballX + 6 > bx && bs.ballX - 6 < bx + bw && bs.ballY + 6 > by && bs.ballY - 6 < by + bh) {

function convCalc(winId) {

      body.innerHTML += '<div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.05);border-radius:4px;margin-bottom:4px;font-size:12px"><span>\u5F55\u97F3 #' + (i + 1) + '</span><span style="color:var(--text-tertiary);font-family:monospace">' + String(dm).padStart(2, '0') + ':' + String(ds).padStart(2, '0') + '</span></div>';
    });
    body.innerHTML += '</div>';
  }
  body.innerHTML += '</div>';
  if (rs.recording && !rs.intervalId) rs.intervalId = setInterval(function() { rs.duration++; var b = document.getElementById('body-' + winId); if (b) renderRecorder(b, winId); }, 1000);
}

function recAction(winId, action) {
  var rs = recState[winId]; if (!rs) return;
  if (action === 'start') { rs.recording = true; rs.duration = 0; }
  else if (action === 'stop') { rs.recording = false; if (rs.intervalId) { clearInterval(rs.intervalId); rs.intervalId = null; } if (rs.duration > 0) rs.records.push(rs.duration); rs.duration = 0; }
  var b = document.getElementById('body-' + winId); if (b) renderRecorder(b, winId);
}

    '</div>';
  setTimeout(function() { chartRender(winId, 'bar'); }, 50);

function chartRender(winId, type) {
  var cvs = document.getElementById('chart-canvas-' + winId); if (!cvs) return;
  var ctx = cvs.getContext('2d'); ctx.clearRect(0, 0, 350, 200);
  var data = [45, 72, 38, 90, 55, 68, 30]; var colors = ['#42a5f5', '#66bb6a', '#ffa726', '#ef5350', '#ab47bc', '#ffd700', '#26c6da'];
  var labels = ['\u5468\u4E00', '\u5468\u4E8C', '\u5468\u4E09', '\u5468\u56DB', '\u5468\u4E94', '\u5468\u516D', '\u5468\u65E5'];
  if (type === 'bar') {
    var bw = 30, gap = 15, maxV = 100, baseY = 170;
    data.forEach(function(v, i) {
      var h = (v / maxV) * 140;
      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(30 + i * (bw + gap), baseY - h, bw, h);
      ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(v, 30 + i * (bw + gap) + bw / 2, baseY - h - 6);
      ctx.fillText(labels[i], 30 + i * (bw + gap) + bw / 2, baseY + 14);
    });
  } else if (type === 'line') {
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#0078d4'; ctx.lineWidth = 2; ctx.beginPath();
    data.forEach(function(v, i) { var x = 40 + i * 45; var y = 170 - (v / 100) * 150; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
    ctx.stroke();
    data.forEach(function(v, i) { var x = 40 + i * 45; var y = 170 - (v / 100) * 150; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(v, x, y - 10); ctx.fillText(labels[i], x, 190); });
  } else if (type === 'pie') {
    var total = data.reduce(function(a, b) { return a + b; }, 0);
    var angle = -Math.PI / 2;
    data.forEach(function(v, i) {
      var slice = (v / total) * Math.PI * 2;
      ctx.fillStyle = colors[i % colors.length]; ctx.beginPath(); ctx.moveTo(175, 90); ctx.arc(175, 90, 70, angle, angle + slice); ctx.fill();
      var mid = angle + slice / 2; ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(v, 175 + Math.cos(mid) * 40, 90 + Math.sin(mid) * 40);
      angle += slice;
    });
  }
}

/* ── 1. Alt+Tab Window Switcher ── */
var altTabIndex=0,altTabOpen=false;
document.addEventListener('keydown',function(e){
  if(e.key==='Tab'&&e.altKey){
    e.preventDefault();
    if(!altTabOpen){altTabOpen=true;altTabIndex=0;renderAltTab();}
    else{altTabIndex=(altTabIndex+1)%Math.max(1,Object.keys(windows).length);updateAltTabSel();}
  }
});
document.addEventListener('keyup',function(e){
  if(e.key==='Alt'&&altTabOpen){
    var ow=Object.keys(windows);var ids=ow.filter(function(k){return windows[k]&&!windows[k].closed});
    if(ids.length>0&&ids[altTabIndex]){focusWindow(ids[altTabIndex]);}
    altTabOpen=false;hideAltTab();
  }
});
function renderAltTab(){
  var ov=document.getElementById('alttab-overlay');
  if(!ov){ov=document.createElement('div');ov.id='alttab-overlay';document.body.appendChild(ov);}
  var ow=Object.keys(windows);var ids=ow.filter(function(k){return windows[k]&&!windows[k].closed});
  ov.innerHTML='<div class="alttab-items">'+ids.map(function(id,i){
    var w=windows[id],app=APPS.find(function(a){return a.id===w.appId})||APPS[0];
    return'<div class="alttab-card'+(i===altTabIndex?' selected':'')+'" id="atc-'+i+'" onclick="focusWindow(\''+id+'\');hideAltTab()"><div class="alttab-card-icon icon-'+app.id+'"><svg class="ico" style="width:24px;height:24px"><use href="#'+app.ico+'"/></svg></div><div class="alttab-card-name">'+app.name+'</div></div>';
  }).join('')+(ids.length===0?'<div style="color:var(--text-tertiary);font-size:14px">没有打开的窗口</div>':'')+'</div>';
  ov.classList.add('show');
}
function updateAltTabSel(){document.querySelectorAll('.alttab-card').forEach(function(c,i){c.classList.toggle('selected',i===altTabIndex)});}
function hideAltTab(){var ov=document.getElementById('alttab-overlay');if(ov)ov.classList.remove('show');altTabOpen=false;}

/* ── 5. Window Tiling ── */
function tileWindows(mode){
  var ow=Object.keys(windows).filter(function(k){return windows[k]&&!windows[k].closed&&!windows[k].minimized});
  if(ow.length===0)return;
  if(mode==='left'||mode==='right'){
    var id=ow[ow.length-1]||focusedWin;if(!id)return;
    var win=windows[id],hw=window.innerWidth/2-8;
    win.el.style.left=(mode==='left'?'0':hw+8)+'px';win.el.style.top='28px';
    win.el.style.width=hw+'px';win.el.style.height=(window.innerHeight-84)+'px';
    win.maximized=false;win.el.classList.remove('maximized');
  }else if(mode==='cascade'){
    ow.forEach(function(k,i){var w=windows[k],ox=20+i*30,oy=28+i*30;w.el.style.left=ox+'px';w.el.style.top=oy+'px';w.el.style.width=Math.min(700,window.innerWidth-ox-40)+'px';w.el.style.height=Math.min(500,window.innerHeight-oy-56)+'px';w.maximized=false;w.el.classList.remove('maximized');});
  }else if(mode==='grid'){
    var cols=Math.min(ow.length,Math.ceil(Math.sqrt(ow.length))),rows=Math.ceil(ow.length/cols);
    var cw=Math.floor((window.innerWidth-16)/cols),ch=Math.floor((window.innerHeight-84)/rows);
    ow.forEach(function(k,i){var w=windows[k],cx=i%cols,cy=Math.floor(i/cols);w.el.style.left=(8+cx*cw)+'px';w.el.style.top=(28+cy*ch)+'px';w.el.style.width=(cw-8)+'px';w.el.style.height=(ch-8)+'px';w.maximized=false;w.el.classList.remove('maximized');});
  }
  showToast('info','窗口布局','已应用 '+({left:'左半屏',right:'右半屏',cascade:'层叠',grid:'网格'}[mode]));
}

  if(breakoutState[id]){if(breakoutState[id].loopId)clearInterval(breakoutState[id].loopId);delete breakoutState[id];}

  if(recState[id]){if(recState[id].intervalId)clearInterval(recState[id].intervalId);delete recState[id];}
  if(codeState[id])delete codeState[id];
  if(diaryState[id])delete diaryState[id];
  if(passState[id])delete passState[id];
  if(clockStates[id]){if(clockStates[id]._tickInt)clearInterval(clockStates[id]._tickInt);if(clockStates[id]._swInt)clearInterval(clockStates[id]._swInt);if(clockStates[id].tm&&clockStates[id].tm.interval)clearInterval(clockStates[id].tm.interval);delete clockStates[id];}

var _termExecOrig=termExec;
termExec=function(cmd,id){
  var c=cmd.toLowerCase().split(/\s+/)[0],arg=cmd.split(/\s+/).slice(1).join(' ');
  if(c==='whoami'){terminalOut(id,cmd,' <span class="val">user</span>');return;}
  if(c==='hostname'){terminalOut(id,cmd,' <span class="val">FusionOS</span>');return;}
  if(c==='ping'){terminalOut(id,cmd,' <span class="val">PING '+arg+' (127.0.0.1): 56 data bytes</span>\n  <span class="info">64 bytes from 127.0.0.1: icmp_seq=0 ttl=64 time=0.3 ms</span>\n  <span class="info">64 bytes from 127.0.0.1: icmp_seq=1 ttl=64 time=0.2 ms</span>\n  <span class="info">64 bytes from 127.0.0.1: icmp_seq=2 ttl=64 time=0.2 ms</span>\n  <span class="val">--- '+arg+' ping statistics ---</span>\n  3 packets transmitted, 3 received, 0% packet loss');return;}
  if(c==='history'){terminalOut(id,cmd,'  '+((termHist[id]||[]).map(function(h,i){return '<span style="color:var(--text-tertiary)">'+(i+1)+'</span> '+escHtml(h)}).join('\n  ')||'无历史'));return;}
  if(c==='env'){terminalOut(id,cmd,'  <span class="val">SHELL=</span>fusion-term\n  <span class="val">OS=</span>FusionOS 8.0\n  <span class="val">USER=</span>user\n  <span class="val">HOME=</span>/home/user\n  <span class="val">LANG=</span>zh-CN');return;}
  if(c==='sysinfo'||c==='systeminfo'){var u=calcDiskUsed(),f=diskFree(),wc=Object.keys(windows).length;terminalOut(id,cmd,'  <span class="val">FusionOS 8.0</span>\n  运行时间: '+Math.floor((Date.now()-window._bootTime)/1000)+'秒\n  打开窗口: '+wc+'\n  磁盘: '+fmtSize(f)+' / '+fmtSize(vDisk.total)+' ('+((u/vDisk.total)*100).toFixed(1)+'%)\n  分辨率: '+window.innerWidth+'x'+window.innerHeight);return;}
  if(c==='version'){terminalOut(id,cmd,'  <span class="val">FusionOS 8.0</span>\n  Build 2026.06.16 | Kernel 8.0.0\n  33 个应用 | 1200+ 命令 | 1000+ 功能');return;}
  if(c==='clear'||c==='cls'){var tl=document.getElementById('tl-'+id);if(tl)tl.innerHTML='';return;}
  if(c==='date'){terminalOut(id,cmd,' <span class="val">'+new Date().toString()+'</span>');return;}
  if(c==='uptime'){var bt=window._bootTime||Date.now();var s=Math.floor((Date.now()-bt)/1000);var d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);terminalOut(id,cmd,' <span class="val">运行时间: '+(d>0?d+'天 ':'')+h+'小时 '+m+'分钟</span>');return;}
  _termExecOrig(cmd,id);
};

  var row=document.createElement('div');row.className='line';row.innerHTML='<span class="prompt">❯ </span><span style="color:#c9d1d9">'+escHtml(cmd)+'</span>';tl.appendChild(row);

/* ── 165. Window management: tile to corners ── */
function tileToCorner(pos){
  var w=windows[focusedWin];if(!w)return;
  var dw=window.innerWidth,dh=window.innerHeight;
  if(pos==='tl'){w.el.style.left='0';w.el.style.top='28px';}
  if(pos==='tr'){w.el.style.left=(dw-400)+'px';w.el.style.top='28px';}
  if(pos==='bl'){w.el.style.left='0';w.el.style.top=(dh-300)+'px';}
  if(pos==='br'){w.el.style.left=(dw-400)+'px';w.el.style.top=(dh-300)+'px';}
}

/* === Ripple Effect on Buttons === */
(function initRipple(){
  document.addEventListener('click',function(e){
    var btn=e.target.closest('button,.btn,.dock-item,.context-item,.start-app-item,.finder-item');
    if(!btn)return;
    var ripple=document.createElement('span');
    ripple.className='btn-ripple';
    var rect=btn.getBoundingClientRect();
    var size=Math.max(rect.width,rect.height);
    ripple.style.width=ripple.style.height=size+'px';
    ripple.style.left=(e.clientX-rect.left-size/2)+'px';
    ripple.style.top=(e.clientY-rect.top-size/2)+'px';
    btn.style.position=btn.style.position||'relative';
    btn.style.overflow='hidden';
    btn.appendChild(ripple);
    setTimeout(function(){ripple.remove();},600);
  });
})();

/* === Window Drag with Inertia === */
(function smoothDrag(){
  var _origDown=winDown;
  winDown=function(e,id){
    if(!windows[id])return;
    var win=windows[id];
    win._dragVelX=0;win._dragVelY=0;
    win._lastDragX=e.clientX;win._lastDragY=e.clientY;
    win._dragT0=Date.now();
    _origDown(e,id);
  };
  var dragFrames={};
  function applyInertia(id){
    var win=windows[id];if(!win||!win._dragging)return;
    if(Math.abs(win._dragVelX)<0.5&&Math.abs(win._dragVelY)<0.5){
      delete dragFrames[id];return;
    }
    var el=win.el,rect=el.getBoundingClientRect();
    var newLeft=rect.left+win._dragVelX;
    var newTop=rect.top+win._dragVelY;
    var maxW=window.innerWidth,maxH=window.innerHeight-32;
    if(newLeft<0){newLeft=0;win._dragVelX*=-0.3;}
    if(newTop<28){newTop=28;win._dragVelY*=-0.3;}
    if(newLeft+rect.width>maxW){newLeft=maxW-rect.width;win._dragVelX*=-0.3;}
    if(newTop+rect.height>maxH-60){newTop=maxH-rect.height-60;win._dragVelY*=-0.3;}
    el.style.left=newLeft+'px';el.style.top=newTop+'px';
    win._dragVelX*=0.92;win._dragVelY*=0.92;
    dragFrames[id]=requestAnimationFrame(function(){applyInertia(id);});
  }
  var _origMove=winMove;
  winMove=function(e,id){
    if(!windows[id]||!windows[id]._dragging)return;
    var win=windows[id];
    var dt=Date.now()-win._dragT0;
    if(dt>16){
      win._dragVelX=(e.clientX-win._lastDragX)*0.8;
      win._dragVelY=(e.clientY-win._lastDragY)*0.8;
      win._lastDragX=e.clientX;win._lastDragY=e.clientY;
      win._dragT0=Date.now();
    }
    _origMove(e,id);
  };
  var _origUp=winUp;
  winUp=function(e,id){
    _origUp(e,id);
    if(windows[id]&&(Math.abs(windows[id]._dragVelX)>0.5||Math.abs(windows[id]._dragVelY)>0.5)){
      applyInertia(id);
    }
  };
})();

/* === Window Edge Snap === */
(function edgeSnap(){
  var _origUp2=winUp;
  winUp=function(e,id){
    if(windows[id]){
      var el=windows[id].el,rect=el.getBoundingClientRect();
      var snapDist=20,snap=false;
      var newLeft=rect.left,newTop=rect.top;
      if(Math.abs(rect.left)<snapDist){newLeft=0;snap=true;}
      if(Math.abs(rect.left+rect.width-window.innerWidth)<snapDist){newLeft=window.innerWidth-rect.width;snap=true;}
      if(Math.abs(rect.top-28)<snapDist){newTop=28;snap=true;}
      if(snap){
        el.style.transition='left 0.2s cubic-bezier(0.34,1.56,0.64,1),top 0.2s cubic-bezier(0.34,1.56,0.64,1)';
        el.style.left=newLeft+'px';el.style.top=newTop+'px';
        setTimeout(function(){el.style.transition='';},250);
      }
    }
    _origUp2(e,id);
  };
})();

/* === Smooth Window Focus Transition === */
(function smoothFocus(){
  var _origFocus=setFocus;
  setFocus=function(id){
    var prevFocus=focusedWin;
    _origFocus(id);
    if(prevFocus&&prevFocus!==id&&windows[prevFocus]){
      windows[prevFocus].el.style.filter='brightness(0.97)';
      setTimeout(function(){if(windows[prevFocus])windows[prevFocus].el.style.filter='';},300);
    }
  };
})();

/* === Window Minimize Animation === */
(function minimizeAnim(){
  var _origMinimize=minimizeWin||function(id){
    if(windows[id]){windows[id].el.style.display='none';windows[id]._minimized=true;}
  };
  var origCloseWin=closeWindow;
  closeWindow=function(id){
    var win=windows[id];if(!win)return;
    // Cleanup intervals
    if(win.appId==='snake'&&snakeState[id]&&snakeState[id]._int)clearInterval(snakeState[id]._int);
    if(win.appId==='video'&&vidState.int)clearInterval(vidState.int);
    if(win.appId==='minesweeper'&&mineState[id]&&mineState[id].timerId)clearInterval(mineState[id].timerId);
    if(win.appId==='tetris'&&tetrisState[id]&&tetrisState[id].dropId)clearInterval(tetrisState[id].dropId);
    if(win.appId==='breakout'&&breakoutState[id]&&breakoutState[id].loopId)clearInterval(breakoutState[id].loopId);
    if(win.appId==='stopwatch-app'&&swState[id]&&swState[id].intervalId)clearInterval(swState[id].intervalId);
    if(win.appId==='recorder'&&recState[id]&&recState[id].intervalId)clearInterval(recState[id].intervalId);
    if(mineState[id])delete mineState[id];
    if(tetrisState[id]){if(tetrisState[id].dropId)clearInterval(tetrisState[id].dropId);delete tetrisState[id];}
    if(breakoutState[id]){if(breakoutState[id].loopId)clearInterval(breakoutState[id].loopId);delete breakoutState[id];}
    if(swState[id]){if(swState[id].intervalId)clearInterval(swState[id].intervalId);delete swState[id];}
    if(recState[id]){if(recState[id].intervalId)clearInterval(recState[id].intervalId);delete recState[id];}
    if(codeState[id])delete codeState[id];
    if(diaryState[id])delete diaryState[id];
    if(passState[id])delete passState[id];
    if(clockStates[id]){if(clockStates[id]._tickInt)clearInterval(clockStates[id]._tickInt);if(clockStates[id]._swInt)clearInterval(clockStates[id]._swInt);if(clockStates[id].tm&&clockStates[id].tm.interval)clearInterval(clockStates[id].tm.interval);delete clockStates[id];}
    if(monStates[id]){if(monStates[id]._int)clearInterval(monStates[id]._int);delete monStates[id];}
    if(snakeState[id]){if(snakeState[id]._int)clearInterval(snakeState[id]._int);delete snakeState[id];}
    win.el.classList.add('closing');
    setTimeout(function(){win.el.remove();delete windows[id];if(focusedWin===id)focusedWin=null;updateDock();},300);
  };
  window._origMinimize=minimizeWin;
})();

/* === Desktop Icon Arrange Animation === */
(function iconArrange(){

/* === Window Resize Snap to Grid === */
(function resizeSnap(){
  var origResize=winResize||function(e,id){};
  if(typeof winResize!=='undefined'){
    winResize=function(e,id){
      origResize(e,id);
      if(windows[id]&&windows[id]._resizing){
        var el=windows[id].el,rect=el.getBoundingClientRect();
        // Snap width/height to 20px grid on release
        var w=Math.round(rect.width/20)*20;
        var h=Math.round(rect.height/20)*20;
        if(w<320)w=320;if(h<200)h=200;
      }
    };
  }
  if(typeof resizeEnd!=='undefined'){
    var origResizeEnd=resizeEnd;
    resizeEnd=function(id){
      if(windows[id]){
        var el=windows[id].el;
        el.style.transition='width 0.2s cubic-bezier(0.34,1.56,0.64,1),height 0.2s cubic-bezier(0.34,1.56,0.64,1)';
        setTimeout(function(){el.style.transition='';},250);
      }
      origResizeEnd(id);
    };
  }
})();

/* === Desktop wallpaper particle system === */
(function particles(){
  var desk=document.getElementById('desktop');

  for(var i=0;i<25;i++){

    p.style.left=Math.random()*100+'%';

  }
})();
